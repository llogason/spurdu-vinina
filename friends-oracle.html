<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spurðu Vinina</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d0d0d;
    --paper: #111111;
    --wall: #1a1a1a;
    --toti: #4af0ff;
    --svala: #ff3cac;
    --gisli: #b4ff39;
    --cream: #f0ead6;
    --spray: rgba(255,255,255,0.03);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--paper);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Concrete wall texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.008) 2px, rgba(255,255,255,0.008) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(255,255,255,0.005) 3px, rgba(255,255,255,0.005) 6px);
    pointer-events: none;
    z-index: 0;
  }

  /* Spray paint splotches on wall */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 300px 200px at 5% 15%, rgba(74,240,255,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 250px 350px at 95% 60%, rgba(255,60,172,0.05) 0%, transparent 70%),
      radial-gradient(ellipse 400px 200px at 50% 95%, rgba(180,255,57,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 200px 200px at 80% 10%, rgba(74,240,255,0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .content { position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    padding: 3rem 2rem 1rem;
    text-align: center;
    position: relative;
  }

  .tag-line {
    font-family: 'Permanent Marker', cursive;
    font-size: 0.85rem;
    color: var(--svala);
    letter-spacing: 0.15em;
    margin-bottom: 0.4rem;
    opacity: 0.85;
    animation: fadeUp 0.7s ease both;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 10vw, 7rem);
    line-height: 0.9;
    letter-spacing: 0.04em;
    position: relative;
    display: inline-block;
    animation: fadeUp 0.7s ease 0.1s both;
  }

  h1 .word1 { color: var(--cream); display: block; }
  h1 .word2 {
    display: block;
    color: transparent;
    -webkit-text-stroke: 2px var(--gisli);
    text-shadow: 0 0 40px rgba(180,255,57,0.3);
  }

  /* Drip effect under title */
  .drip-container {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-top: -4px;
    animation: fadeUp 0.7s ease 0.2s both;
  }

  .drip {
    width: 3px;
    border-radius: 0 0 3px 3px;
    animation: drip 3s ease-in-out infinite;
  }
  .drip:nth-child(1) { height: 18px; background: var(--toti); animation-delay: 0s; }
  .drip:nth-child(2) { height: 30px; background: var(--svala); animation-delay: 0.4s; }
  .drip:nth-child(3) { height: 12px; background: var(--gisli); animation-delay: 0.8s; }
  .drip:nth-child(4) { height: 24px; background: var(--toti); animation-delay: 1.2s; }
  .drip:nth-child(5) { height: 8px; background: var(--svala); animation-delay: 0.2s; }
  .drip:nth-child(6) { height: 35px; background: var(--gisli); animation-delay: 0.6s; }
  .drip:nth-child(7) { height: 15px; background: var(--cream); opacity:0.3; animation-delay: 1s; }

  @keyframes drip {
    0%, 100% { transform: scaleY(1); opacity: 1; }
    50% { transform: scaleY(1.15); opacity: 0.7; }
  }

  .subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    color: rgba(240,234,214,0.4);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 1.2rem;
    animation: fadeUp 0.7s ease 0.3s both;
  }

  /* ── STICKER TAPE divider ── */
  .tape {
    width: 100%;
    height: 28px;
    background: repeating-linear-gradient(
      90deg,
      rgba(240,234,214,0.06) 0px, rgba(240,234,214,0.06) 40px,
      transparent 40px, transparent 80px
    );
    border-top: 1px solid rgba(240,234,214,0.08);
    border-bottom: 1px solid rgba(240,234,214,0.08);
    margin: 1.5rem 0;
    position: relative;
    overflow: hidden;
  }

  .tape::after {
    content: '✦ SPURÐU VININA ✦ SPURÐU VININA ✦ SPURÐU VININA ✦ SPURÐU VININA ✦ SPURÐU VININA ✦ SPURÐU VININA ✦';
    position: absolute;
    white-space: nowrap;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: rgba(240,234,214,0.15);
    animation: marquee 18s linear infinite;
  }

  @keyframes marquee {
    from { left: 0; }
    to { left: -50%; }
  }

  /* ── CHARACTER CARDS ── */
  .character-grid {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    padding: 1rem 1.5rem 2rem;
    flex-wrap: wrap;
    animation: fadeUp 0.7s ease 0.35s both;
  }

  .character-card {
    width: 190px;
    cursor: pointer;
    position: relative;
    transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    animation: cardFloat 5s ease-in-out infinite;
  }

  .character-card:nth-child(1) { animation-delay: 0s; transform: rotate(-1.5deg); }
  .character-card:nth-child(2) { animation-delay: 1.8s; transform: rotate(1deg); }
  .character-card:nth-child(3) { animation-delay: 3.4s; transform: rotate(-0.8deg); }

  @keyframes cardFloat {
    0%, 100% { translate: 0 0px; }
    50% { translate: 0 -7px; }
  }

  .character-card:hover { transform: rotate(0deg) scale(1.05) translateY(-10px) !important; animation-play-state: paused; }
  .character-card.active { transform: rotate(0deg) scale(1.07) translateY(-12px) !important; animation-play-state: paused; }

  /* Card base — looks like spray-painted on concrete */
  .card-inner {
    background: var(--wall);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    border: 1px solid rgba(255,255,255,0.07);
  }

  /* Neon spray border on hover/active */
  .character-card[data-char="toti"] .card-inner { --glow: var(--toti); }
  .character-card[data-char="svala"] .card-inner { --glow: var(--svala); }
  .character-card[data-char="gisli"] .card-inner { --glow: var(--gisli); }

  .character-card:hover .card-inner,
  .character-card.active .card-inner {
    border-color: var(--glow);
    box-shadow: 0 0 20px var(--glow), 0 0 60px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
  }

  /* Corner spray marks */
  .card-inner::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--glow, transparent);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 2;
  }
  .character-card:hover .card-inner::before,
  .character-card.active .card-inner::before { opacity: 1; }

  .avatar-section {
    padding: 1.2rem 1rem 0.8rem;
    display: flex;
    justify-content: center;
    position: relative;
  }

  /* Spray paint halo behind photo */
  .avatar-section::before {
    content: '';
    position: absolute;
    width: 130px; height: 130px;
    border-radius: 50%;
    background: var(--glow, #fff);
    opacity: 0;
    filter: blur(25px);
    transition: opacity 0.4s;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  .character-card[data-char="toti"] .avatar-section { --glow: var(--toti); }
  .character-card[data-char="svala"] .avatar-section { --glow: var(--svala); }
  .character-card[data-char="gisli"] .avatar-section { --glow: var(--gisli); }

  .character-card:hover .avatar-section::before,
  .character-card.active .avatar-section::before { opacity: 0.15; }

  .avatar-wrapper {
    width: 120px; height: 120px;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    z-index: 1;
    border: 3px solid rgba(255,255,255,0.1);
    transition: border-color 0.3s;
  }

  .character-card[data-char="toti"]:hover .avatar-wrapper,
  .character-card[data-char="toti"].active .avatar-wrapper { border-color: var(--toti); }
  .character-card[data-char="svala"]:hover .avatar-wrapper,
  .character-card[data-char="svala"].active .avatar-wrapper { border-color: var(--svala); }
  .character-card[data-char="gisli"]:hover .avatar-wrapper,
  .character-card[data-char="gisli"].active .avatar-wrapper { border-color: var(--gisli); }

  .avatar-wrapper img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
    filter: contrast(1.1) saturate(1.2);
    transition: filter 0.3s;
  }

  .character-card:hover .avatar-wrapper img,
  .character-card.active .avatar-wrapper img {
    filter: contrast(1.2) saturate(1.5);
  }

  .card-info {
    padding: 0.8rem 1rem 1.1rem;
    position: relative;
  }

  /* Graffiti tag background scribble */
  .card-info::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.3));
  }

  .char-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.06em;
    line-height: 1;
    position: relative;
    z-index: 1;
  }

  .character-card[data-char="toti"] .char-name { color: var(--toti); }
  .character-card[data-char="svala"] .char-name { color: var(--svala); }
  .character-card[data-char="gisli"] .char-name { color: var(--gisli); }

  .char-role {
    font-family: 'Permanent Marker', cursive;
    font-size: 0.7rem;
    color: rgba(240,234,214,0.5);
    margin-top: 0.1rem;
    position: relative;
    z-index: 1;
  }

  .char-tags {
    display: flex;
    gap: 0.3rem;
    margin-top: 0.6rem;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }

  .tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.2rem 0.5rem;
    border-radius: 2px;
    border: 1px solid;
  }

  .character-card[data-char="toti"] .tag { color: var(--toti); border-color: rgba(74,240,255,0.3); background: rgba(74,240,255,0.07); }
  .character-card[data-char="svala"] .tag { color: var(--svala); border-color: rgba(255,60,172,0.3); background: rgba(255,60,172,0.07); }
  .character-card[data-char="gisli"] .tag { color: var(--gisli); border-color: rgba(180,255,57,0.3); background: rgba(180,255,57,0.07); }

  /* ── SELECTED BANNER ── */
  .selected-banner { display: none; max-width: 620px; margin: 0 auto 1rem; padding: 0 1.5rem; }
  .selected-banner.visible { display: block; animation: fadeUp 0.4s ease; }

  .banner-inner {
    background: var(--wall);
    border-left: 4px solid var(--active-color, #fff);
    border-radius: 2px;
    padding: 0.9rem 1.4rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    box-shadow: -4px 0 20px rgba(255,255,255,0.05);
  }

  .banner-emoji { font-size: 1.8rem; }

  .banner-text h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    color: var(--cream);
  }

  .banner-text p {
    font-size: 0.82rem;
    color: rgba(240,234,214,0.45);
    line-height: 1.4;
    font-weight: 500;
  }

  /* ── CHAT ── */
  .chat-container { display: none; max-width: 640px; margin: 0 auto; padding: 0 1.5rem 3rem; }
  .chat-container.visible { display: block; animation: fadeUp 0.5s ease; }

  .chat-box {
    background: var(--wall);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .chat-header {
    padding: 0.9rem 1.4rem;
    display: flex;
    align-items: center;
    gap: 0.9rem;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    background: rgba(0,0,0,0.3);
  }

  .chat-header-avatar { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
  .chat-header-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }

  .chat-header-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    color: var(--cream);
  }

  .chat-header-status { font-size: 0.72rem; color: rgba(240,234,214,0.4); font-weight: 600; }

  .online-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    margin-right: 5px; vertical-align: middle;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  .chat-messages {
    padding: 1.4rem;
    min-height: 220px;
    max-height: 360px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }

  .message { margin-bottom: 1rem; animation: msgIn 0.3s ease; }
  @keyframes msgIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  .message.user { text-align: right; }

  .msg-bubble {
    display: inline-block;
    max-width: 80%;
    padding: 0.65rem 1rem;
    border-radius: 3px;
    font-size: 0.95rem;
    line-height: 1.55;
    font-weight: 500;
  }

  .message.user .msg-bubble {
    background: rgba(255,255,255,0.07);
    color: var(--cream);
    border: 1px solid rgba(255,255,255,0.1);
    border-bottom-right-radius: 0;
  }

  .message.character .msg-bubble {
    color: var(--ink);
    font-weight: 600;
    border-bottom-left-radius: 0;
  }

  .typing-row { display: none; padding: 0 1.4rem 0.6rem; align-items: center; gap: 0.6rem; }
  .typing-row.active { display: flex; }

  .typing-avatar { width: 26px; height: 26px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
  .typing-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }

  .dots {
    display: flex; gap: 4px; align-items: center;
    padding: 7px 12px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .dots span {
    width: 6px; height: 6px; border-radius: 50%; background: rgba(240,234,214,0.4);
    animation: dotBounce 1.4s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-5px); } }

  .chat-input-area {
    padding: 0.9rem 1.2rem;
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex;
    gap: 0.7rem;
    align-items: flex-end;
    background: rgba(0,0,0,0.2);
  }

  textarea.msg-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 3px;
    color: var(--cream);
    padding: 0.7rem 1rem;
    font-family: 'Barlow', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    resize: none;
    outline: none;
    transition: border-color 0.3s, background 0.3s;
    max-height: 100px;
  }

  textarea.msg-input::placeholder { color: rgba(240,234,214,0.25); font-style: italic; }
  textarea.msg-input:focus { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.25); }

  .send-btn {
    width: 42px; height: 42px;
    border-radius: 3px;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    font-weight: 900;
    transition: all 0.25s;
    flex-shrink: 0;
    color: var(--ink);
  }
  .send-btn:hover { transform: scale(1.1); filter: brightness(1.2); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  /* ── CONFETTI ── */
  .confetti-piece {
    position: fixed; pointer-events: none;
    animation: confettiFall 1.2s ease-out forwards;
    z-index: 999;
  }
  @keyframes confettiFall {
    0% { opacity:1; transform: translate(0,0) rotate(0deg) scale(1); }
    100% { opacity:0; transform: translate(var(--cx), var(--cy)) rotate(var(--cr)) scale(0.2); }
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(18px); }
    to { opacity:1; transform: translateY(0); }
  }

  /* Scanline overlay for that gritty feel */
  .scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.03) 3px, rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  @media (max-width: 580px) {
    .character-grid { gap: 1rem; }
    .character-card { width: 155px; }
    .avatar-wrapper { width: 100px; height: 100px; }
    .char-name { font-size: 1.5rem; }
  }
</style>
</head>
<body>
<div class="scanlines"></div>

<div class="content">
  <header>
    <div class="tag-line">// spyrðu þá sem vita //<br></div>
    <h1>
      <span class="word1">SPURÐU</span>
      <span class="word2">VININA</span>
    </h1>
    <div class="drip-container">
      <div class="drip"></div><div class="drip"></div><div class="drip"></div>
      <div class="drip"></div><div class="drip"></div><div class="drip"></div>
      <div class="drip"></div>
    </div>
    <p class="subtitle">Veldu vin · Spurðu hvað sem er</p>
  </header>

  <div class="tape"></div>

  <div class="character-grid" id="characterGrid">

    <div class="character-card" data-char="toti" onclick="selectCharacter(this)">
      <div class="card-inner">
        <div class="avatar-section">
          <div class="avatar-wrapper" id="avatar-toti"></div>
        </div>
        <div class="card-info">
          <div class="char-name">Tóti</div>
          <div class="char-role">Hugsuðurinn</div>
          <div class="char-tags">
            <span class="tag">Rólægur</span>
            <span class="tag">Hugsandi</span>
            <span class="tag">Spakur</span>
          </div>
        </div>
      </div>
    </div>

    <div class="character-card" data-char="svala" onclick="selectCharacter(this)">
      <div class="card-inner">
        <div class="avatar-section">
          <div class="avatar-wrapper" id="avatar-svala"></div>
        </div>
        <div class="card-info">
          <div class="char-name">Svala</div>
          <div class="char-role">Framkvæmdakonan</div>
          <div class="char-tags">
            <span class="tag">Orkumikil</span>
            <span class="tag">Skipuleggjari</span>
            <span class="tag">Djarfur</span>
          </div>
        </div>
      </div>
    </div>

    <div class="character-card" data-char="gisli" onclick="selectCharacter(this)">
      <div class="card-inner">
        <div class="avatar-section">
          <div class="avatar-wrapper" id="avatar-gisli"></div>
        </div>
        <div class="card-info">
          <div class="char-name">Gísli</div>
          <div class="char-role">Hvetjandinn</div>
          <div class="char-tags">
            <span class="tag">Beinskeittur</span>
            <span class="tag">Djarfur</span>
            <span class="tag">Áhugasamur</span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="selected-banner" id="selectedBanner">
    <div class="banner-inner" id="bannerInner">
      <div class="banner-emoji" id="bannerEmoji"></div>
      <div class="banner-text">
        <h3 id="bannerName"></h3>
        <p id="bannerDesc"></p>
      </div>
    </div>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="chat-box">
      <div class="chat-header" id="chatHeader">
        <div class="chat-header-avatar" id="headerAvatar"></div>
        <div>
          <div class="chat-header-name" id="headerName"></div>
          <div class="chat-header-status">
            <span class="online-dot" id="onlineDot"></span>
            <span>á netinu núna</span>
          </div>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="typing-row" id="typingRow">
        <div class="typing-avatar" id="typingAvatar"></div>
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
      <div class="chat-input-area">
        <textarea class="msg-input" id="msgInput" rows="1" placeholder="Skrifaðu spurningu þína…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>

  document.getElementById('avatar-svala').innerHTML = avatarSVGs.svala;
  document.getElementById('avatar-gisli').innerHTML = avatarSVGs.gisli;
  document.querySelectorAll('.avatar-wrapper img').forEach(img => {
    img.style.borderRadius = '';
  });
});

let activeChar = null;
let history = [];

function selectCharacter(card) {
  document.querySelectorAll('.character-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');

  const key = card.dataset.char;
  activeChar = chars[key];
  history = [];

  confetti(card);

  document.getElementById('bannerEmoji').textContent = activeChar.emoji;
  document.getElementById('bannerName').textContent = activeChar.name;
  document.getElementById('bannerDesc').textContent = activeChar.desc;
  document.getElementById('bannerInner').style.borderLeftColor = activeChar.color;
  document.getElementById('selectedBanner').classList.add('visible');

  // Chat header
  document.getElementById('headerAvatar').innerHTML = avatarSVGs[key];
  document.getElementById('headerName').textContent = activeChar.name;
  document.getElementById('onlineDot').style.background = activeChar.color;
  document.getElementById('sendBtn').style.background = activeChar.color;

  document.getElementById('typingAvatar').innerHTML = avatarSVGs[key];

  document.getElementById('chatMessages').innerHTML = '';
  document.getElementById('chatContainer').classList.add('visible');

  addMessage('character', activeChar.welcome);
  history.push({ role: 'assistant', content: activeChar.welcome });

  setTimeout(() => document.getElementById('msgInput').focus(), 300);
}

function addMessage(type, text) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'message ' + type;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  if (type === 'character') {
    bubble.style.background = activeChar.color;
  }
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !activeChar) return;
  document.getElementById('sendBtn').disabled = true;
  input.value = ''; input.style.height = 'auto';
  addMessage('user', text);
  history.push({ role: 'user', content: text });
  document.getElementById('typingRow').classList.add('active');
  document.getElementById('chatMessages').scrollTop = 99999;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: activeChar.system,
        messages: history
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || '…';
    history.push({ role: 'assistant', content: reply });
    document.getElementById('typingRow').classList.remove('active');
    addMessage('character', reply);
  } catch(e) {
    document.getElementById('typingRow').classList.remove('active');
    addMessage('character', 'Eitthvað fór úrskeiðis. Reyndu aftur?');
  }
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('msgInput').focus();
}

function confetti(card) {
  const rect = card.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const color = activeChar?.color || '#fff';
  const colors = [color, '#ffffff', '#f0ead6', color, 'rgba(255,255,255,0.5)'];
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const angle = (i / 20) * Math.PI * 2;
    const dist = 50 + Math.random() * 90;
    p.style.cssText = `
      left:${cx}px; top:${cy}px;
      width:${4+Math.random()*6}px; height:${4+Math.random()*6}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --cx:${Math.cos(angle)*dist}px; --cy:${Math.sin(angle)*dist}px;
      --cr:${Math.random()*720-360}deg;
      animation-duration:${0.8+Math.random()*0.7}s;
      border-radius:${Math.random()>0.5?'50%':'2px'};
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 2000);
  }
}
</script>
